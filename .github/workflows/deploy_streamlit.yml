name: Deploy to Streamlit

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: pytest -q

      - name: Trigger Streamlit deploy webhook (optional)
        env:
          HOOK: ${{ vars.STREAMLIT_DEPLOY_HOOK }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
        run: |
          if [ -n "$HOOK" ]; then
            echo "Triggering Streamlit deploy webhook"
            curl -X POST -H "Content-Type: application/json" -d "{\"repo\": \"${REPO}\", \"ref\": \"${REF}\", \"sha\": \"${SHA}\"}" "$HOOK"
          else
            echo "STREAMLIT_DEPLOY_HOOK not set; skipping deploy webhook"
          fi
